<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>futura · exam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.61/build/spline-viewer.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #04070f;
      --bg-1: #0b1220;
      --bg-2: #111b30;
      --card: #0b1730;
      --card-2: #101f3b;
      --txt: #f2f2f5;
      --muted: #c3d2e8;
      --line: rgba(255, 255, 255, 0.34);
      --accent: #e9f1ff;
      --ok: #9ce4af;
      --pulse: rgba(145, 201, 255, 0.32);
      --radius-lg: 40px;
      --radius-md: 28px;
      --shadow: 0 34px 84px -24px rgba(0, 0, 0, 0.72);
      --font-ui: "Manrope", sans-serif;
      --font-display: "Sora", sans-serif;
      --btn-top: #3cb4ff;
      --btn-bottom: #0079ca;
      --btn-base: #00518d;
      --btn-glow: rgba(121, 194, 255, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-ui), system-ui, -apple-system, sans-serif;
    }

    [hidden] {
      display: none !important;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      background: linear-gradient(160deg, var(--bg-0), var(--bg-1) 40%, var(--bg-2));
      color: var(--txt);
      padding: 24px;
      position: relative;
    }

    .spline-bg {
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      background: linear-gradient(160deg, #080e19, #121c33);
    }

    .spline-bg spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.95;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(1000px 560px at 10% 14%, rgba(200, 233, 255, 0.14), transparent 55%),
        radial-gradient(900px 600px at 92% 86%, rgba(157, 196, 255, 0.12), transparent 52%),
        linear-gradient(160deg, rgba(7, 10, 18, 0.62), rgba(9, 16, 28, 0.68));
    }

    .exam-shell {
      width: min(980px, 100%);
      border-radius: var(--radius-lg);
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.24),
        inset 0 -14px 26px rgba(6, 14, 26, 0.34);
      padding: 30px;
      position: relative;
      z-index: 1;
      animation: shell-enter 560ms cubic-bezier(.2, .9, .2, 1) both;
      overflow: hidden;
    }

    .exam-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.14);
      pointer-events: none;
    }

    .center {
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      animation: fade-rise 540ms 230ms ease both;
    }

    .hero-copy {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .headline {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-family: var(--font-display), sans-serif;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: var(--txt);
      text-shadow: 0 6px 22px rgba(0, 0, 0, 0.42);
      line-height: 1.1;
    }

    .subline {
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.45rem);
      line-height: 1.35;
      max-width: 900px;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(173, 223, 255, 0.7);
      border-radius: 999px;
      padding: 14px 30px;
      color: var(--txt);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0) 42%),
        linear-gradient(150deg, var(--btn-top), var(--btn-bottom));
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.2s ease, filter .2s ease;
      box-shadow:
        0 12px 0 var(--btn-base),
        0 24px 24px -16px rgba(0, 0, 0, 0.88),
        0 0 0 1px rgba(188, 228, 255, 0.36) inset;
      animation: button-pulse 2.8s ease-in-out infinite;
      font-family: var(--font-display), sans-serif;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.42);
    }

    .btn:hover:enabled {
      transform: translateY(-2px) scale(1.01);
      border-color: rgba(201, 237, 255, 0.85);
      box-shadow:
        0 14px 0 var(--btn-base),
        0 30px 34px -18px rgba(0, 0, 0, 0.92),
        0 0 0 1px rgba(220, 243, 255, 0.45) inset,
        0 0 30px -8px var(--btn-glow);
      filter: saturate(1.12);
    }

    .btn:active:enabled {
      transform: translateY(6px);
      box-shadow:
        0 6px 0 var(--btn-base),
        0 12px 18px -14px rgba(0, 0, 0, 0.88),
        0 0 0 1px rgba(166, 217, 255, 0.3) inset;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .exam-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: 1.2fr 1fr;
      align-items: stretch;
      animation: fade-rise 500ms 260ms ease both;
    }

    #stageActive .exam-grid {
      min-height: 420px;
    }

    @media (max-width: 920px) {
      .exam-grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: var(--radius-md);
      padding: 20px;
      background: var(--card-2);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        inset 0 -12px 22px rgba(5, 12, 22, 0.3),
        0 24px 36px -26px rgba(0, 0, 0, 0.85);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    #stageActive .panel {
      min-height: 360px;
    }

    .panel:hover {
      transform: translateY(-2px);
      border-color: rgba(178, 220, 255, 0.62);
    }

    .counter {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .question {
      font-size: 1.15rem;
      line-height: 1.45;
      margin-bottom: 16px;
      min-height: 94px;
    }

    .badge {
      display: inline-block;
      padding: 9px 16px;
      border: 1px solid rgba(180, 223, 255, 0.46);
      border-radius: 999px;
      font-size: 0.9rem;
      color: var(--accent);
      background: rgba(83, 133, 188, 0.2);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .status {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      min-height: 20px;
    }

    .instruction {
      margin-top: 8px;
      font-size: 0.95rem;
      color: var(--ok);
      min-height: 20px;
    }

    .camera-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(185, 225, 255, 0.52);
      background: #050507;
      position: relative;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.12),
        0 18px 38px -20px rgba(0, 0, 0, 0.9);
    }

    #stageActive .panel:last-child {
      display: flex;
      align-items: center;
    }

    #stageActive .camera-wrap {
      height: 100%;
      min-height: 300px;
      aspect-ratio: auto;
    }

    #cameraVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 2;
      pointer-events: none;
    }

    #cameraCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 1;
    }

    .result-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .result-card {
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 18px;
      padding: 14px 16px;
      min-width: 160px;
      background: #162c4f;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
      animation: fade-rise 520ms ease both;
    }

    .result-card p:first-child {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .result-card p:last-child {
      font-size: 1.2rem;
      font-weight: 700;
    }

    #stageActive .panel:first-child { animation: fade-rise 500ms 80ms ease both; }
    #stageActive .panel:last-child { animation: fade-rise 500ms 140ms ease both; }

    @keyframes shell-enter {
      from { opacity: 0; transform: translateY(14px) scale(0.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fade-rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes button-pulse {
      0%, 100% {
        box-shadow:
          0 12px 0 var(--btn-base),
          0 24px 24px -16px rgba(0, 0, 0, 0.88),
          0 0 0 1px rgba(188, 228, 255, 0.36) inset;
      }
      50% {
        box-shadow:
          0 12px 0 var(--btn-base),
          0 24px 24px -16px rgba(0, 0, 0, 0.88),
          0 0 0 1px rgba(188, 228, 255, 0.36) inset,
          0 0 20px -8px var(--pulse);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    #logo{
      visibility: hidden;
    }
  </style>
</head>
<body>
  <div class="spline-bg" aria-hidden="true">
    <spline-viewer id="logo" url="https://prod.spline.design/7HcFWOtgxYDGEdTI/scene.splinecode"></spline-viewer>
  </div>
  <main class="exam-shell" id="examApp">
    <section id="stageIdle" class="center">
      <div class="hero-copy">
        <h1 class="headline">Hands-Free Inclusive Exam</h1>
        <p class="subline">Head gesture control only. Nod = YES, Shake = NO.</p>
      </div>
      <button id="startExamBtn" class="btn" type="button">Start Exam</button>
    </section>

    <section id="stageActive" hidden>
      <div class="exam-grid">
        <article class="panel">
          <p class="counter" id="questionCounter">Question 0 of 0</p>
          <p class="question" id="questionText">Preparing question...</p>
          <p class="badge" id="selectedAnswer">Waiting for your head gesture...</p>
          <p class="status" id="statusText"></p>
          <p class="instruction" id="instructionText"></p>
        </article>

        <article class="panel">
          <div class="camera-wrap">
            <video id="cameraVideo" autoplay playsinline muted></video>
            <canvas id="cameraCanvas"></canvas>
          </div>
        </article>
      </div>
    </section>

    <section id="stageResult" hidden>
      <article class="panel">
        <p class="question">Exam Completed</p>
        <div class="result-row">
          <div class="result-card">
            <p>Total Questions</p>
            <p id="resultTotal">0</p>
          </div>
          <div class="result-card">
            <p>Correct Answers</p>
            <p id="resultCorrect">0</p>
          </div>
          <div class="result-card">
            <p>Final Score</p>
            <p id="resultScore">0 / 0</p>
          </div>
        </div>
        <p class="status">Result announced.</p>
        <p class="instruction">Voice summary completed.</p>
      </article>
    </section>
  </main>

  <script src="https://docs.opencv.org/4.10.0/opencv.js" async></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script type="module" src="../../components/exam/exam-engine.js"></script>
</body>
</html>
